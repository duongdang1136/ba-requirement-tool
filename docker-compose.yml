services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ba-tool-backend
    ports:
      - "8099:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/ba_tool.db
      - UPLOAD_DIR=/app/uploads
      - MODELS_DIR=/app/models
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:80"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ba-tool-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
  models:
  data:
