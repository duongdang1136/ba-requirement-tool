services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ba-tool-backend
    ports:
      - "8099:8000"
    volumes:
      - ba_uploads:/app/uploads
      - ba_models:/app/models
      - ba_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/ba_tool.db
      - UPLOAD_DIR=/app/uploads
      - MODELS_DIR=/app/models
      - ASR_MODEL_DIR=/app/models/asr/sherpa-onnx-whisper-small
      - ASR_LANGUAGE=vi
      - ASR_NUM_THREADS=8
      - VAD_MODEL_PATH=/app/models/vad/silero_vad.onnx
      - DIARIZATION_SEGMENTATION_MODEL=/app/models/diarization/sherpa-onnx-pyannote-segmentation-3-0/model.onnx
      - DIARIZATION_EMBEDDING_MODEL=/app/models/diarization/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
      - DIARIZATION_CHUNK_MINUTES=25
      - WORKER_POLL_INTERVAL_SECONDS=2.0
      - JOB_TIMEOUT_MINUTES=240
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","http://localhost:80"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ba-tool-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ba-tool-worker
    command: ["python", "-m", "app.worker"]
    volumes:
      - ba_uploads:/app/uploads
      - ba_models:/app/models
      - ba_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/ba_tool.db
      - UPLOAD_DIR=/app/uploads
      - MODELS_DIR=/app/models
      - ASR_MODEL_DIR=/app/models/asr/sherpa-onnx-whisper-small
      - ASR_LANGUAGE=vi
      - ASR_NUM_THREADS=8
      - VAD_MODEL_PATH=/app/models/vad/silero_vad.onnx
      - DIARIZATION_SEGMENTATION_MODEL=/app/models/diarization/sherpa-onnx-pyannote-segmentation-3-0/model.onnx
      - DIARIZATION_EMBEDDING_MODEL=/app/models/diarization/3dspeaker_speech_eres2net_base_sv_zh-cn_3dspeaker_16k.onnx
      - DIARIZATION_CHUNK_MINUTES=25
      - WORKER_POLL_INTERVAL_SECONDS=2.0
      - JOB_TIMEOUT_MINUTES=240
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ba_uploads:
  ba_models:
  ba_data:
